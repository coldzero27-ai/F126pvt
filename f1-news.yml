name: Update F1 news

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch F1 headlines
        run: |
          python3 - <<'EOF'
          import json, re, html, urllib.request
          from email.utils import parsedate_to_datetime
          import xml.etree.ElementTree as ET

          FEEDS = [
              ("F1.com",    "https://www.formula1.com/en/latest/all.xml"),
              ("BBC",       "https://feeds.bbci.co.uk/sport/formula1/rss.xml"),
              ("Autosport", "https://www.autosport.com/rss/f1/news/"),
          ]
          UA = {"User-Agent": "Mozilla/5.0 (F1 dashboard news bot)"}

          items = []
          for src, url in FEEDS:
              try:
                  req = urllib.request.Request(url, headers=UA)
                  raw = urllib.request.urlopen(req, timeout=20).read()
                  root = ET.fromstring(raw)
                  for it in root.iter("item"):
                      t = (it.findtext("title") or "").strip()
                      t = html.unescape(re.sub(r"\s+", " ", t))
                      if not t:
                          continue
                      ts = 0
                      pd = it.findtext("pubDate")
                      if pd:
                          try: ts = int(parsedate_to_datetime(pd).timestamp())
                          except Exception: pass
                      items.append({"t": t, "src": src, "ts": ts})
              except Exception as e:
                  print(f"skip {src}: {e}")

          # newest first, dedupe near-identical titles, keep 12
          items.sort(key=lambda x: x["ts"], reverse=True)
          seen, out = set(), []
          for it in items:
              key = re.sub(r"[^a-z0-9]", "", it["t"].lower())[:60]
              if key in seen:
                  continue
              seen.add(key)
              out.append(it)
              if len(out) == 12:
                  break

          if not out:
              print("no headlines fetched — keeping existing news.json")
              raise SystemExit(0)

          # only write if the headline set actually changed (avoids empty commits)
          try:
              old = json.load(open("news.json"))
              if [i["t"] for i in old.get("items", [])] == [i["t"] for i in out]:
                  print("headlines unchanged")
                  raise SystemExit(0)
          except FileNotFoundError:
              pass

          import datetime
          json.dump(
              {"updated": datetime.datetime.utcnow().isoformat() + "Z", "items": out},
              open("news.json", "w"), ensure_ascii=False, indent=1)
          print(f"wrote {len(out)} headlines")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "f1-news-bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet && echo "nothing to commit" || (git commit -m "news: refresh headlines" && git push)
